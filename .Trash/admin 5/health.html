<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=0.90, maximum-scale=0.90, minimum-scale=0.90, user-scalable=no, viewport-fit=cover" />
  <title>PlayMatrix Sistem Sağlığı</title>
  <link rel="stylesheet" href="health.phase4-1.css" />
  <link rel="stylesheet" href="../shell-enhancements.css" />
  <script src="../shell-enhancements.js" defer></script>
  <link rel="stylesheet" href="/public/css/phase4-inline.css" />
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="toolbar">
        <div>
          <h1 class="title">PlayMatrix Sistem Sağlığı</h1>
          <div class="subtitle">Bu yüzey yalnızca aktif yönetici oturumu ile açılır. Canlı servis, süreç ve sayaç özeti tek ekranda izlenir.</div>
        </div>
        <div class="buttons">
          <button id="reloadBtn" type="button">Health Yenile</button>
          <button id="backBtn" class="secondary" type="button">Admin Panele Dön</button>
        </div>
      </div>
      <div class="badges pm-csp-inline-1b0f4999d2">
        <div class="badge warn" id="authBadge">Yönetici oturumu doğrulanıyor...</div>
        <div class="badge warn" id="healthBadge">Health bekleniyor...</div>
        <div class="badge warn mono" id="baseBadge">API hazırlanıyor...</div>
      </div>
    </section>

    <section class="card">
      <div class="status" id="statusBox">Yönetici health yüzeyi hazırlanıyor...</div>
    </section>

    <section class="grid g-4" id="metricGrid"></section>

    <section class="card">
      <div class="section-head">
        <div class="pm-csp-inline-b094a7d605">Ham JSON</div>
        <div class="mono pm-csp-inline-7fc448e2b0" id="userBox">—</div>
      </div>
      <div class="json"><pre id="rawOutput">Hazır.</pre></div>
    </section>
  </div>

  <script src="/public/playmatrix-static-runtime.js"></script>
  <script src="/public/playmatrix-api.js"></script>
  <script type="module" src="health.phase4-module-1.js"></script>
</body>
</html>
