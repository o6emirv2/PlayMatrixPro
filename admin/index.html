<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="playmatrix-api-url" content="https://emirhan-siye.onrender.com">
  <title>PlayMatrix Admin Matrix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="brand-card">
        <img src="/public/assets/images/logo.png" alt="PlayMatrix" onerror="this.style.display='none'">
        <div>
          <strong>PLAYMATRIX</strong>
          <span>ADMIN MATRIX</span>
        </div>
      </div>
      <nav class="admin-nav" aria-label="Admin menü">
        <button class="is-active" data-tab="dashboard">Genel Bakış</button>
        <button data-tab="users">Kullanıcı Yönetimi</button>
        <button data-tab="economy">Bakiye Yönetimi</button>
        <button data-tab="ban">Ban Yönetimi</button>
        <button data-tab="payments">Ödeme Yönetimi</button>
        <button data-tab="promo">Promo Yönetimi</button>
        <button data-tab="logs">Canlı Log</button>
        <button data-tab="email">E-posta Güncelle</button>
        <button data-tab="notifications">Bildirim Yönetimi</button>
        <button data-tab="games">Oyun İzleme</button>
        <button data-tab="cleanup">Firestore Temizlik</button>
      </nav>
      <div class="secure-box">
        <b>Güvenlik</b>
        <span>Auth + UID/E-posta admin whitelist</span>
        <span>Canlı log: Render in-memory</span>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <div>
          <p class="eyebrow">Production Control</p>
          <h1>PlayMatrix Admin Panel</h1>
          <span id="adminActor">Admin doğrulaması bekleniyor…</span>
        </div>
        <div class="top-actions">
          <button id="refreshBtn" class="ghost">Yenile</button>
          <a class="ghost" href="/" target="_blank" rel="noopener">Siteyi Aç</a>
        </div>
      </header>

      <section id="statusStrip" class="status-strip">
        <article><b id="metricUsers">0</b><span>Kullanıcı</span></article>
        <article><b id="metricBalance">0 MC</b><span>Toplam Bakiye</span></article>
        <article><b id="metricBanned">0</b><span>Banlı</span></article>
        <article><b id="metricLogs">0</b><span>Runtime Log</span></article>
      </section>

      <section id="view" class="panel" aria-live="polite"></section>
    </main>
  </div>

  <script src="/public/playmatrix-static-runtime.js"></script>
  <script src="/public/playmatrix-api.js"></script>
  <script src="/public/avatar-registry.js"></script>
  <script src="/public/avatar-frame.js"></script>
  <script src="/public/game-topbar-sync.js"></script>
  <script src="script.js" defer></script>
</body>
</html>
