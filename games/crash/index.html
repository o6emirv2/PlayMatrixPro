<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PlayMatrix Crash</title>
  <link rel="stylesheet" href="/games/crash/style.css">
</head>
<body>
  <main class="game-shell">
    <header class="game-topbar">
      <a href="/" class="back-link">← PlayMatrix</a>
      <div><p>Backend Doğrulamalı</p><h1>Crash</h1></div>
      <strong id="balanceLabel">Bakiye: -</strong>
    </header>
    <section class="crash-panel">
      <div class="multiplier" id="multiplierLabel">1.00x</div>
      <div class="controls">
        <input id="stakeInput" type="number" min="1" max="10000" value="25">
        <button id="startBtn">Round Başlat</button>
        <button id="cashoutBtn" disabled>Cashout</button>
      </div>
      <p id="statusText" class="muted">Socket bağlantısı bekleniyor.</p>
    </section>
  </main>
  <div id="toastRegion" class="toast-region"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/games/crash/script.js" defer></script>
</body>
</html>
