<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PlayMatrix Satranç</title>
  <link rel="stylesheet" href="/games/chess/style.css">
</head>
<body>
  <main class="game-shell">
    <header class="game-topbar">
      <a href="/" class="back-link">← PlayMatrix</a>
      <div><p>Online</p><h1>Satranç</h1></div>
      <button id="quickMatchBtn">Hızlı Eşleş</button>
    </header>
    <section class="game-layout">
      <aside class="panel">
        <h2>Oda Durumu</h2>
        <p id="statusText">Socket bağlantısı bekleniyor.</p>
        <p class="muted" id="roomText">Oda yok</p>
        <div class="move-form">
          <input id="moveInput" placeholder="e2e4" maxlength="5">
          <button id="sendMoveBtn">Hamle Gönder</button>
        </div>
      </aside>
      <section class="board-panel">
        <div class="board" id="board"></div>
        <pre id="pgnBox"></pre>
      </section>
    </section>
  </main>
  <div id="toastRegion" class="toast-region"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/games/chess/script.js" defer></script>
</body>
</html>
