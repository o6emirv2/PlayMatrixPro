<body data-game="pattern-master">

<h1 class="sr-only">PlayMatrix Pattern Master - Hafıza ve Hız Oyunu</h1>

<header class="top-bar" id="guestHeader">
    <a href="/" class="back-btn" aria-label="Ana Sayfaya Dön">GERİ</a>
    <div class="brand">PATTERN MASTER</div>
    <div></div> 
</header>

<header class="top-bar-full" id="levelHeader">
    <div class="account-level-section">
        <div class="level-badge-wrap">
            <i class="fa-solid fa-layer-group"></i>
            <div class="level-badge-indicator" id="uiAccountLevelBadge">1</div>
        </div>
        
        <div class="level-stats-area">
            <div class="stat-row-top">
                <div class="stat-label">(MC) BAKİYE</div>
                <div class="stat-balance"><span>MC</span> <span id="ui-balance">0.00</span></div>
            </div>
            <div class="stat-row-bottom">
                <div class="stat-lvl-text">Hesap Seviyeniz</div>
                <div class="stat-bar-bg">
                    <div class="stat-bar-fill" id="uiAccountLevelBar"></div>
                </div>
                <div class="stat-pct" id="uiAccountLevelPct">0%</div>
            </div>
        </div>
    </div>
    
    <div class="top-actions">
        <a href="/" class="action-icon-btn red"><i class="fa-solid fa-power-off"></i></a>
    </div>
</header>

<main class="game-wrapper" id="gameWrapper">
    <div id="info" aria-live="polite">LEVEL: <span id="level">1</span> | COMBO: <span id="combo">0</span></div>
    <div id="status" aria-live="assertive">HAZIR OL</div>

    <div id="grid" role="grid" aria-label="Oyun Izgarası">
        <div class="btn neon-up" data-dir="up" role="button" aria-label="Araba Butonu">🚗</div>
        <div class="btn neon-right" data-dir="right" role="button" aria-label="Top Butonu">⚽️</div>
        <div class="btn neon-left" data-dir="left" role="button" aria-label="Çilek Butonu">🍓</div>
        <div class="btn neon-down" data-dir="down" role="button" aria-label="Elmas Butonu">💎</div>
    </div>

    <button id="startBtn" aria-label="Oyunu Başlat">BAŞLAT</button>
    <div id="highscore" aria-live="polite">EN YÜKSEK SKOR: 0</div>
</main>



  <script src="/public/playmatrix-static-runtime.js"></script><script src="script.js" defer></script>
</body>
