<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<title>PlayMatrix - Snake Pro | Yılan Oyunu</title>

<meta name="keywords" content="yılan oyunu, snake oyna, klasik snake oyunu, nokia yılan oyunu, retro oyunlar, PlayMatrix, ücretsiz beceri oyunu, tarayıcı oyunları">

<meta property="og:title" content="PlayMatrix Snake Pro | Klasik Yılan Oyunu">
<meta property="og:description" content="Nostaljik yeşil ekran, hızlanan oyun yapısı ve elmalar... En uzun yılanı sen yapabilir misin? Hemen oyna!">
<meta property="og:image" content="https://playmatrix.com.tr/assets/snake-promo.jpg">
<meta property="og:url" content="https://playmatrix.com.tr/games/snake" />

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />



  <link rel="stylesheet" href="style.css" />
</head>
<body data-game="snake">

<h1 class="sr-only">PlayMatrix Snake Pro - Retro Nostaljik Yılan Oyunu</h1>

<header class="top-bar" id="guestHeader">
    <a href="/" class="back-btn" aria-label="Ana Sayfaya Dön">GERİ</a>
    <div class="brand">Snake Pro</div>
    <div class="pm-csp-inline-bcce8b88d2"></div>
</header>

<header class="top-bar-full" id="levelHeader">
    <div class="account-level-section">
        <div class="level-badge-wrap">
            <i class="fa-solid fa-layer-group"></i>
            <div class="level-badge-indicator" id="uiAccountLevelBadge">1</div>
        </div>
        
        <div class="level-stats-area">
            <div class="stat-row-top">
                <div class="stat-label">(MC) BAKİYE</div>
                <div class="stat-balance"><span>MC</span> <span id="ui-balance">0.00</span></div>
            </div>
            <div class="stat-row-bottom">
                <div class="stat-lvl-text">Hesap Seviyeniz</div>
                <div class="stat-bar-bg">
                    <div class="stat-bar-fill" id="uiAccountLevelBar"></div>
                </div>
                <div class="stat-pct" id="uiAccountLevelPct">0%</div>
            </div>
        </div>
    </div>
    
    <div class="top-actions">
        <a href="/" class="action-icon-btn red"><i class="fa-solid fa-power-off"></i></a>
    </div>
</header>

<main class="main-container">
    <div class="console" aria-label="Oyun Konsolu">
        
        <div class="score-panel" aria-live="polite">
            <span>SCORE:<span id="score">0</span></span>
            <span>BEST:<span id="high">0</span></span>
        </div>

        <div class="screen-container">
            <canvas id="game" width="300" height="300" aria-label="Yılan Oyunu Alanı"></canvas>
            
            <div id="startup" class="overlay" role="button" aria-label="Oyunu Başlat">
                <div class="pm-csp-inline-b794ace7dd">SNAKE PRO</div>
                <div class="blink pm-csp-inline-5eb19b99d8">BAŞLAMAK İÇİN DOKUN</div>
            </div>

            <div id="gameover" class="overlay pm-csp-inline-6b99de8b69" role="button" aria-label="Tekrar Oyna">
                <div class="pm-csp-inline-641ef7b92f">EYVAH!</div>
                <div id="finalScore" class="pm-csp-inline-c403b9eb32"></div>
                <div class="blink pm-csp-inline-d1ab5f2526">TEKRAR DENE</div>
            </div>
        </div>

        <div class="controls" aria-label="Yön Kontrolleri">
            <button class="btn btn-up" id="btn-UP" aria-label="Yukarı Git">↑</button>
            <button class="btn btn-left" id="btn-LEFT" aria-label="Sola Git">←</button>
            <button class="btn btn-down" id="btn-DOWN" aria-label="Aşağı Git">↓</button>
            <button class="btn btn-right" id="btn-RIGHT" aria-label="Sağa Git">→</button>
        </div>
    </div>
</main>



  <script src="/public/playmatrix-static-runtime.js"></script>
  <script src="/public/playmatrix-api.js"></script>
  <script src="/public/avatar-registry.js"></script>
  <script src="/public/avatar-frame.js"></script>
  <script src="/public/game-topbar-sync.js"></script><script src="script.js" defer></script>
</body>
</html>
